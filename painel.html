<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Rastreamento</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f5; color: #111; min-height: 100vh; }
  header { background: #1D9E75; color: white; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 500; }
  .container { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
  .card { background: white; border-radius: 12px; border: 1px solid #e4e4e7; padding: 1.25rem; margin-bottom: 1rem; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #d4d4d8; font-size: 15px; outline: none; }
  input:focus { border-color: #1D9E75; }
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-green { background: #1D9E75; color: white; }
  .btn-red { background: #E24B4A; color: white; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 6px; font-weight: 500; }
  .badge-on { background: #dcfce7; color: #166534; }
  .badge-off { background: #f4f4f5; color: #666; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  #map { height: 420px; border-radius: 10px; border: 1px solid #e4e4e7; z-index: 0; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .stat { background: #f9f9f9; border-radius: 8px; padding: 0.75rem 1rem; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 15px; font-weight: 500; }
  .log { font-size: 12px; color: #666; max-height: 120px; overflow-y: auto; }
  .log-item { padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
  .section-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .waiting { height: 420px; border-radius: 10px; border: 1px solid #e4e4e7; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<header>
  <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  <h1>Painel de Rastreamento</h1>
  <span class="badge badge-off" id="badge" style="margin-left:auto;"><span class="dot"></span> <span id="badge-text">Aguardando</span></span>
</header>

<div class="container">
  <div class="card">
    <div class="row">
      <input type="text" id="cod" placeholder="Código da entrega (ex: PEDIDO-001)" />
      <button class="btn btn-green" onclick="rastrear()">Rastrear</button>
      <button class="btn btn-red" onclick="parar()" id="btn-parar" style="display:none;">Parar</button>
    </div>
    <div id="map-waiting" class="waiting">
      <svg width="40" height="40" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6-3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 9m0 8V9m0 0L9 7"/></svg>
      <p>Digite um código e clique em Rastrear</p>
      <p style="font-size:12px;">O mapa aparecerá aqui em tempo real</p>
    </div>
    <div id="map" style="display:none;"></div>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-label">Latitude</div><div class="stat-value" id="lat">—</div></div>
    <div class="stat"><div class="stat-label">Longitude</div><div class="stat-value" id="lng">—</div></div>
    <div class="stat"><div class="stat-label">Última atualização</div><div class="stat-value" id="hora">—</div></div>
  </div>

  <div class="card">
    <div class="section-title">Histórico de posições</div>
    <div class="log" id="log"><div class="log-item" style="color:#aaa;">Nenhuma posição ainda.</div></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.0/firebase-database-compat.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDPfBDhUh6iTNuSID0gLRsYfpsqKhyFPTg",
  authDomain: "rastreador-feee1.firebaseapp.com",
  databaseURL: "https://rastreador-feee1-default-rtdb.firebaseio.com",
  projectId: "rastreador-feee1",
  storageBucket: "rastreador-feee1.firebasestorage.app",
  messagingSenderId: "235008572673",
  appId: "1:235008572673:web:367d78bd37d355058f6f00"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map = null, marker = null, listener = null, trail = [];

function iniciarMapa(lat, lng) {
  document.getElementById('map-waiting').style.display = 'none';
  document.getElementById('map').style.display = 'block';

  if (!map) {
    map = L.map('map').setView([lat, lng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    const icon = L.divIcon({
      className: '',
      html: `<div style="background:#1D9E75;width:20px;height:20px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`,
      iconSize: [20, 20],
      iconAnchor: [10, 10]
    });
    marker = L.marker([lat, lng], { icon }).addTo(map);
    marker.bindPopup('<b>Entregador</b>').openPopup();
  } else {
    marker.setLatLng([lat, lng]);
    map.setView([lat, lng], map.getZoom());
  }

  trail.push([lat, lng]);
  if (trail.length > 1) {
    if (window.trailLine) map.removeLayer(window.trailLine);
    window.trailLine = L.polyline(trail, { color: '#1D9E75', weight: 3, opacity: 0.6, dashArray: '6,8' }).addTo(map);
  }
}

function rastrear() {
  const cod = document.getElementById('cod').value.trim();
  if (!cod) { alert('Digite o código da entrega'); return; }
  if (listener) listener.off();
  trail = [];

  document.getElementById('badge').className = 'badge badge-on';
  document.getElementById('badge-text').textContent = 'Monitorando...';
  document.getElementById('btn-parar').style.display = 'inline-block';

  listener = db.ref('entregas/' + cod + '/localizacao');
  listener.on('value', snap => {
    const d = snap.val();
    if (!d) return;
    const hora = new Date(d.timestamp).toLocaleTimeString('pt-BR');

    document.getElementById('lat').textContent = d.lat.toFixed(6);
    document.getElementById('lng').textContent = d.lng.toFixed(6);
    document.getElementById('hora').textContent = hora;
    document.getElementById('badge-text').textContent = 'Online';

    iniciarMapa(d.lat, d.lng);

    const log = document.getElementById('log');
    if (log.firstChild && log.firstChild.style && log.firstChild.style.color === 'rgb(170, 170, 170)') log.innerHTML = '';
    const item = document.createElement('div');
    item.className = 'log-item';
    item.textContent = `${hora} — Lat: ${d.lat.toFixed(5)}, Lng: ${d.lng.toFixed(5)}`;
    log.prepend(item);
    if (log.children.length > 30) log.lastChild.remove();
  });
}

function parar() {
  if (listener) listener.off();
  document.getElementById('badge').className = 'badge badge-off';
  document.getElementById('badge-text').textContent = 'Parado';
  document.getElementById('btn-parar').style.display = 'none';
}
</script>
</body>
</html>
