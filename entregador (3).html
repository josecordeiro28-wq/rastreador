<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entregador - Rastreamento</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f5; color: #111; min-height: 100vh; }
  header { background: #1D9E75; color: white; padding: 1rem 1.5rem; text-align: center; }
  header h1 { font-size: 18px; font-weight: 500; }
  header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .container { max-width: 480px; margin: 1.5rem auto; padding: 0 1rem; }
  .card { background: white; border-radius: 16px; border: 1px solid #e4e4e7; padding: 1.5rem; margin-bottom: 1rem; }
  input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #d4d4d8; font-size: 16px; outline: none; margin-bottom: 1rem; }
  input:focus { border-color: #1D9E75; }
  .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; font-weight: 500; transition: opacity 0.15s; }
  .btn-green { background: #1D9E75; color: white; }
  .btn-red { background: #E24B4A; color: white; margin-top: 10px; }
  .btn:active { opacity: 0.85; }
  .status-box { text-align: center; padding: 2rem 1rem; }
  .status-icon { font-size: 64px; margin-bottom: 12px; }
  .status-title { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
  .status-sub { font-size: 14px; color: #888; }
  .coords { font-size: 13px; color: #1D9E75; margin-top: 8px; font-weight: 500; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .info-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 1rem; font-size: 13px; color: #166534; margin-bottom: 1rem; }
  .info-box strong { display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<header>
  <h1>📦 Tela do Entregador</h1>
  <p>Compartilhe sua localização em tempo real</p>
</header>

<div class="container">
  <div class="info-box">
    <strong>Como funciona:</strong>
    Digite o código da entrega, toque em iniciar e aceite a permissão de GPS. Sua localização será enviada automaticamente a cada 3 segundos.
  </div>

  <div class="card" id="card-form">
    <input type="text" id="cod" placeholder="Código da entrega (ex: PEDIDO-001)" />
    <button class="btn btn-green" id="btn-iniciar" onclick="iniciar()">📍 Iniciar compartilhamento</button>
    <button class="btn btn-red" id="btn-parar" onclick="parar()" style="display:none;">⏹ Parar rastreamento</button>
  </div>

  <div class="card">
    <div class="status-box" id="status-box">
      <div class="status-icon">🔴</div>
      <div class="status-title">Localização não compartilhada</div>
      <div class="status-sub">Toque em iniciar para começar</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.0/firebase-database-compat.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDPfBDhUh6iTNuSID0gLRsYfpsqKhyFPTg",
  authDomain: "rastreador-feee1.firebaseapp.com",
  databaseURL: "https://rastreador-feee1-default-rtdb.firebaseio.com",
  projectId: "rastreador-feee1",
  storageBucket: "rastreador-feee1.firebasestorage.app",
  messagingSenderId: "235008572673",
  appId: "1:235008572673:web:367d78bd37d355058f6f00"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let intervalo = null;
let ativo = false;

function iniciar() {
  const cod = document.getElementById('cod').value.trim();
  if (!cod) { alert('Digite o código da entrega'); return; }
  if (!navigator.geolocation) { alert('GPS não disponível neste dispositivo'); return; }

  ativo = true;
  document.getElementById('btn-iniciar').style.display = 'none';
  document.getElementById('btn-parar').style.display = 'block';
  document.getElementById('cod').disabled = true;

  document.getElementById('status-box').innerHTML = `
    <div class="status-icon pulse">🟢</div>
    <div class="status-title">Compartilhando localização</div>
    <div class="status-sub">Entrega: <strong>${cod}</strong></div>
    <div class="coords" id="coords">Obtendo GPS...</div>
  `;

  const ref = db.ref('entregas/' + cod + '/localizacao');

  function enviar() {
    if (!ativo) return;
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      ref.set({ lat, lng, timestamp: Date.now() });
      const el = document.getElementById('coords');
      if (el) el.textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);
    }, err => {
      const el = document.getElementById('coords');
      if (el) el.textContent = 'Erro ao obter GPS: ' + err.message;
    }, { enableHighAccuracy: true, timeout: 5000 });
  }

  enviar();
  intervalo = setInterval(enviar, 3000);
}

function parar() {
  ativo = false;
  clearInterval(intervalo);
  document.getElementById('btn-iniciar').style.display = 'block';
  document.getElementById('btn-parar').style.display = 'none';
  document.getElementById('cod').disabled = false;

  document.getElementById('status-box').innerHTML = `
    <div class="status-icon">🔴</div>
    <div class="status-title">Rastreamento encerrado</div>
    <div class="status-sub">Toque em iniciar para recomeçar</div>
  `;
}
</script>
</body>
</html>
